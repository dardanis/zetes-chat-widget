  <title>Simple HTML Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f4f6f8;
      color: #222;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 20px 40px;
      text-align: center;
    }

    nav {
      background: #111827;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      max-width: 600px;
      width: 100%;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 15px;
      color: #111827;
    }

    .card p {
      margin-bottom: 25px;
      line-height: 1.6;
      color: #555;
    }

    .button {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .button:hover {
      background: #1d4ed8;
    }

    footer {
      background: #1f2937;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 14px;
    }
  </style>
