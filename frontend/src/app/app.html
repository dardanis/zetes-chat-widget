<main class="min-h-screen bg-[var(--app-bg)] text-[var(--app-text)] antialiased">
  @if (auth.isBootstrapping()) {
    <section class="flex min-h-screen items-center justify-center">
      <div class="text-center">
        <div class="mx-auto h-8 w-8 animate-spin rounded-full border-2 border-[var(--app-border)] border-t-[var(--app-accent)]"></div>
        <p class="mt-4 text-sm text-[var(--app-text-muted)]">Restoring session...</p>
      </div>
    </section>
  } @else {
    <router-outlet />
  }
</main>
