name: Deploy - Self Hosted Windows

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Deploy to C:\chat
        shell: powershell
        run: |
          # Add Git to PATH
          $env:PATH = "C:\Program Files\Git\cmd;$env:PATH"

          $deployPath = "C:\chat"
          Write-Host "Deploying to $deployPath..."

          Set-Location $deployPath

          Write-Host "Updating code..."
          git fetch origin main
          git reset --hard origin/main

          Write-Host "Installing PHP dependencies..."
          composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Lock file outdated - running composer update to sync..."
            composer update --no-interaction --prefer-dist --no-dev --optimize-autoloader
          }

          Write-Host "Building root frontend / Vite..."
          npm run build

          Write-Host "Building Angular frontend..."
          Set-Location frontend
          if (Test-Path "..\public\ng") {
            Remove-Item "..\public\ng" -Recurse -Force
          }
          if (Test-Path "..\public\widget") {
            Remove-Item "..\public\widget" -Recurse -Force
          }
          npm run build:all
          Set-Location ..

          Write-Host "Running database migrations..."
          php artisan migrate --force

          Write-Host "Clearing Laravel cache..."
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

          Write-Host "Optimizing Laravel..."
          php artisan optimize

          Write-Host "Deployment completed successfully."
